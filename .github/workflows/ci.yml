name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build

      - name: i18n parity check (all 11 locales must have same key count)
        run: |
          declare -a counts
          for lang in en pt es fr de ru tr ar zh ko ja; do
            count=$(node -e "const f=require('./src/locales/$lang.json');function k(o){let r=0;for(const x in o){if(typeof o[x]==='object'&&o[x]!==null)r+=k(o[x]);else r++}return r}console.log(k(f))")
            echo "$lang: $count"
            counts+=("$count")
          done
          unique=$(printf '%s\n' "${counts[@]}" | sort -u | wc -l)
          if [ "$unique" -ne 1 ]; then
            echo "FAIL: locales have divergent key counts"
            exit 1
          fi
          echo "PARITY OK"
