<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Block browser auto-translation (Chrome/Edge/Safari): we ship our own
         11-locale i18n; browser MT on top of it sometimes mangles brand names
         (e.g. "DAD BIGDADDYS" → "PAPAI GRANDÃOS"). Users still pick language
         via Settings → our own i18n. -->
    <meta name="google" content="notranslate" />

    <!-- DAD CODEX theme — matches --ink-void -->
    <meta name="theme-color" content="#13172a" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS PWA install meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DAD War Room" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons — full platform coverage (wave 13 rebuild)
         ?v=2 cache-bust appended so iOS Safari refetches the new Bracketed-D
         icon instead of serving the old DadCrest from its aggressive icon
         cache. Bump this number whenever the icon art changes. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48.png?v=2" />

    <!-- Apple Touch — iPhone (120), iPad (152), iPad Pro (167), default (180) -->
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png?v=2" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png?v=2" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=2" />

    <!-- Safari pinned-tab (monochrome) -->
    <link rel="mask-icon" href="/mask-icon.svg?v=2" color="#f4cf73" />

    <meta name="description" content="DAD War Room — Strategy hub for [DAD] BIGDADDYS, Kingdom 1652 (Kingshot). Visual, multilingual guides for every event." />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack) -->
    <meta property="og:title" content="DAD War Room — Kingdom 1652" />
    <meta property="og:description" content="Strategy hub for the Kingshot alliance [DAD] BIGDADDYS. Visual, multilingual guides." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/og-image.png?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DAD War Room — Kingdom 1652 · Kingshot" />

    <!-- Twitter / X cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DAD War Room — Kingdom 1652" />
    <meta name="twitter:description" content="Strategy hub for the Kingshot alliance [DAD] BIGDADDYS. Visual, multilingual guides." />
    <meta name="twitter:image" content="/icons/og-image.png?v=2" />

    <!-- Fonts: DAD CODEX §2 — Cinzel Decorative + Cinzel + Cormorant Garamond + Outfit + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>DAD War Room — Kingdom 1652</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
