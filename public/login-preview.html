<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>DAD War Room — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  :root {
    --gold: #f4cf73;
    --gold-soft: #ffdb8a;
    --gold-glow: #ffe9a3;
    --gold-deep: #b8861a;
    --ember: #ff7a3b;
    --cream: #f3ecda;
    --paper: #c9c0a8;
    --mute: #7d7666;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --safe-l: env(safe-area-inset-left, 0px);
    --safe-r: env(safe-area-inset-right, 0px);
  }
  *,*::before,*::after { box-sizing: border-box; }
  html,body { margin: 0; padding: 0; }
  html {
    background: #000;
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--cream);
    position: relative;
    overflow-x: hidden;
    min-height: 100dvh;
    line-height: 1.45;
  }

  /* ═══════════ BACKGROUND STACK ═══════════ */

  /* 1. Deep base + warm bottom (campfire glow up from below) */
  .base {
    position: fixed; inset: 0; z-index: -10;
    background:
      radial-gradient(120% 60% at 50% 110%, rgba(255, 122, 59, 0.22) 0%, transparent 55%),
      radial-gradient(80% 90% at 50% 95%, rgba(244, 207, 115, 0.10) 0%, transparent 60%),
      linear-gradient(180deg, #06060a 0%, #08080d 50%, #0a0905 100%);
  }

  /* 2. Video layer (optional — drops in if file exists) */
  .video-bg {
    position: fixed; inset: 0; z-index: -9;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0; pointer-events: none;
    transition: opacity 800ms ease-out;
  }
  .video-bg.loaded { opacity: 0.85; }

  /* 3. Canvas fire embers (always running) */
  #embers {
    position: fixed; inset: 0; z-index: -8;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* 4. Heat haze: subtle drifting warm tint */
  .heat {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 55vh; z-index: -7;
    pointer-events: none;
    background: radial-gradient(120% 100% at 50% 100%,
      rgba(255, 122, 59, 0.10) 0%,
      rgba(177, 56, 56, 0.06) 30%,
      transparent 65%);
    filter: blur(6px);
    animation: heat-shimmer 9s ease-in-out infinite;
    will-change: transform, opacity;
  }
  @keyframes heat-shimmer {
    0%, 100% { transform: translateY(0) scaleY(1); opacity: 0.9; }
    50%      { transform: translateY(-6px) scaleY(1.04); opacity: 1; }
  }

  /* 5. Smoke layer top (atmospheric depth) */
  .smoke {
    position: fixed; left: 0; right: 0; top: 0;
    height: 30vh; z-index: -6;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0.65) 0%, transparent 100%);
  }

  /* 6. Form-side scrim (gradient for readability under content) */
  .scrim {
    position: fixed; inset: 0; z-index: -2;
    pointer-events: none;
    background:
      radial-gradient(70% 60% at 50% 55%, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.70) 100%);
  }

  /* 7. Vignette */
  .vignette {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 80%, rgba(0,0,0,0.92) 100%);
  }

  /* ═══════════ TOP CHROME ═══════════ */
  .top-chrome {
    position: fixed;
    top: calc(var(--safe-top) + 14px);
    left: calc(var(--safe-l) + 14px);
    right: calc(var(--safe-r) + 14px);
    z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    pointer-events: none;
  }
  .top-chrome > * { pointer-events: auto; }

  .brand-mini {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: 'Cinzel', serif; font-weight: 600;
    font-size: 10.5px; letter-spacing: 0.32em; text-transform: uppercase;
    color: rgba(243, 236, 218, 0.78);
    line-height: 1;
    white-space: nowrap;
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
  }
  .brand-mini .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .brand-mini .sep { color: rgba(244, 207, 115, 0.45); margin: 0 2px; }
  .brand-mini .gold { color: var(--gold-soft); }

  .lang-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.40);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(244, 207, 115, 0.22);
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--cream);
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 200ms, background 200ms;
    line-height: 1;
  }
  .lang-btn:active, .lang-btn:hover { border-color: rgba(244, 207, 115, 0.55); background: rgba(0,0,0,0.55); }
  .lang-btn .flag { font-size: 13px; }
  .lang-btn i { color: var(--gold-soft); font-size: 10px; }

  /* ═══════════ MAIN STAGE ═══════════ */
  .stage {
    position: relative; z-index: 5;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding:
      calc(var(--safe-top) + 70px)
      calc(var(--safe-r) + 22px)
      calc(var(--safe-bot) + 22px)
      calc(var(--safe-l) + 22px);
    gap: 28px;
  }

  /* ═══ HERO TYPOGRAPHY ═══ */
  .hero {
    text-align: center;
    max-width: 100%;
    animation: hero-in 1.1s cubic-bezier(0.22, 1, 0.36, 1) both 0.1s;
  }
  @keyframes hero-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'Cinzel', serif; font-weight: 500;
    font-size: 9.5px; letter-spacing: 0.46em; text-transform: uppercase;
    color: rgba(255, 219, 138, 0.62);
    margin: 0 0 14px;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 30px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(244, 207, 115, 0.55), transparent);
  }

  .title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(40px, 11.5vw, 88px);
    letter-spacing: 0.10em;
    line-height: 0.92;
    margin: 0 0 16px;
    /* Glow is on the PARENT — drops onto the whole word as a unit */
    filter:
      drop-shadow(0 2px 12px rgba(0, 0, 0, 0.55))
      drop-shadow(0 0 32px rgba(255, 122, 59, 0.16));
    animation: ember-pulse 4.5s ease-in-out infinite;
    will-change: filter;
  }
  /* Each letter carries its OWN metallic gradient + glint band.
     background-clip:text on the parent doesn't paint through inline-block
     children — so we put the gradients on the spans themselves.
     Per-letter glint delay creates a left-to-right "wave" sweep. */
  .title span {
    display: inline-block;
    opacity: 0;
    transform: translateY(16px) scaleY(0.82);
    background-image:
      linear-gradient(105deg,
        transparent 30%,
        rgba(255, 255, 255, 0.55) 46%,
        rgba(255, 255, 255, 0.95) 50%,
        rgba(255, 255, 255, 0.55) 54%,
        transparent 70%),
      linear-gradient(180deg, #fff5d8 0%, #f8efd7 45%, #ebdcb3 75%, #d9c38b 100%);
    background-size: 250% 100%, 100% 100%;
    background-position: 100% 0, 0 0;
    background-repeat: no-repeat;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation:
      forge-reveal 800ms cubic-bezier(0.22, 1, 0.36, 1) calc(var(--i) * 80ms) forwards,
      glint-sweep 7s ease-in-out calc(1.8s + (var(--i) * 70ms)) infinite;
    will-change: transform, opacity, background-position;
  }
  @keyframes forge-reveal {
    0%   { opacity: 0; transform: translateY(16px) scaleY(0.82); }
    55%  { opacity: 1; transform: translateY(-3px) scaleY(1.06); }
    100% { opacity: 1; transform: translateY(0)   scaleY(1); }
  }
  @keyframes glint-sweep {
    0%, 80% { background-position: 100% 0, 0 0; }
    100%    { background-position: 0%   0, 0 0; }
  }
  @keyframes ember-pulse {
    0%, 100% {
      filter:
        drop-shadow(0 2px 12px rgba(0, 0, 0, 0.55))
        drop-shadow(0 0 32px rgba(255, 122, 59, 0.14));
    }
    50% {
      filter:
        drop-shadow(0 2px 12px rgba(0, 0, 0, 0.55))
        drop-shadow(0 0 56px rgba(255, 122, 59, 0.34));
    }
  }

  /* Inscription stamp — DAD acronym revealed below the title.
     Cinzel uppercase tracked = looks engraved in metal.
     Animates in AFTER the forge-reveal of BIGDADDYS finishes. */
  .ornament {
    display: inline-flex;
    align-items: center;
    gap: clamp(10px, 2.6vw, 16px);
    margin: 22px 0 0;
    animation: stamp-in 700ms cubic-bezier(0.22, 1, 0.36, 1) both 1.65s;
    will-change: opacity, transform;
  }
  .ornament .line {
    width: clamp(24px, 8vw, 44px);
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(244, 207, 115, 0.65),
      transparent);
    flex-shrink: 0;
  }
  .ornament .stamp {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(9.5px, 2.4vw, 11px);
    letter-spacing: clamp(0.22em, 0.55vw, 0.32em);
    text-transform: uppercase;
    color: rgba(255, 219, 138, 0.86);
    text-shadow:
      0 1px 6px rgba(0, 0, 0, 0.7),
      0 0 14px rgba(255, 122, 59, 0.20);
    white-space: nowrap;
    line-height: 1;
  }
  .ornament .stamp .sep {
    color: rgba(244, 207, 115, 0.42);
    font-weight: 400;
    margin: 0 1px;
  }
  @keyframes stamp-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ═══ FORM ═══ */
  .form-wrap {
    width: 100%;
    max-width: 360px;
    animation: form-in 1s cubic-bezier(0.22, 1, 0.36, 1) both 0.3s;
  }
  @keyframes form-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  form { display: flex; flex-direction: column; gap: 20px; }

  .field { position: relative; }
  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: rgba(255, 219, 138, 0.72);
    margin-bottom: 8px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    transition: color 220ms;
  }
  .field-input {
    position: relative;
    display: flex; align-items: center;
    border-bottom: 1px solid rgba(243, 236, 218, 0.30);
    transition: border-color 240ms;
    background: rgba(0, 0, 0, 0.18);
    border-radius: 6px 6px 0 0;
    padding: 0 12px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .field-input::after {
    content: '';
    position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
    transform: scaleX(0); transform-origin: center;
    transition: transform 340ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .field-input input {
    flex: 1; min-width: 0; width: 100%;
    background: transparent; border: none; outline: none;
    color: var(--cream);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;    /* >=16 prevents iOS auto-zoom */
    padding: 11px 0;
    letter-spacing: 0.015em;
    font-weight: 400;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }
  .field-input input::placeholder {
    color: rgba(243, 236, 218, 0.35);
    font-weight: 300;
  }
  .field-input .ico {
    color: rgba(243, 236, 218, 0.42);
    font-size: 18px;
    cursor: pointer; user-select: none;
    padding: 4px 0 4px 6px;
    transition: color 200ms;
  }
  .field-input .ico:active { color: var(--gold-soft); }
  .field:focus-within label { color: var(--gold-glow); }
  .field:focus-within .field-input {
    border-bottom-color: rgba(255, 233, 163, 0.10);
    background: rgba(0, 0, 0, 0.30);
  }
  .field:focus-within .field-input::after { transform: scaleX(1); }
  .field:focus-within .ico { color: var(--gold-glow); }

  /* PRIMARY BUTTON — thin gold ring, no fill */
  .btn {
    margin-top: 4px;
    position: relative;
    display: inline-flex; align-items: center; justify-content: center; gap: 14px;
    width: 100%;
    padding: 16px 22px;
    border-radius: 4px;
    background: linear-gradient(180deg, rgba(244, 207, 115, 0.08) 0%, rgba(244, 207, 115, 0.02) 100%);
    border: 1px solid rgba(244, 207, 115, 0.55);
    color: var(--gold-soft);
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 240ms cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .btn::before {
    content: '';
    position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(110deg, transparent, rgba(255, 245, 218, 0.16), transparent);
    transition: left 900ms ease-out;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 1px;
    border-radius: 3px;
    box-shadow: inset 0 0 18px rgba(244, 207, 115, 0);
    transition: box-shadow 300ms;
    pointer-events: none;
  }
  .btn:hover {
    border-color: var(--gold);
    color: var(--gold-glow);
    background: linear-gradient(180deg, rgba(244, 207, 115, 0.18) 0%, rgba(244, 207, 115, 0.06) 100%);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px -8px rgba(244, 207, 115, 0.4);
  }
  .btn:hover::before { left: 140%; }
  .btn:hover::after { box-shadow: inset 0 0 18px rgba(244, 207, 115, 0.25); }
  .btn:active { transform: scale(0.98); }
  .btn i { font-size: 13px; }
  .btn .arrow { transition: transform 240ms; }
  .btn:hover .arrow { transform: translateX(4px); }

  .forgot {
    margin: 14px 0 0;
    text-align: center;
    font-size: 11px;
    color: rgba(201, 192, 168, 0.72);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
  .forgot strong { color: var(--gold-soft); font-weight: 600; cursor: pointer; }

  /* ═══ BOTTOM ═══ */
  .bottom-zone {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    margin-top: 6px;
    animation: form-in 1s cubic-bezier(0.22, 1, 0.36, 1) both 0.5s;
  }

  .pwa-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border: 1px solid rgba(244, 207, 115, 0.20);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.03em;
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 200ms, transform 200ms;
  }
  .pwa-chip:active { transform: scale(0.97); border-color: rgba(244, 207, 115, 0.55); }
  .pwa-chip i { color: var(--gold-soft); font-size: 13px; }
  .pwa-chip strong { color: var(--gold-soft); font-weight: 600; }

  .credit {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: rgba(125, 118, 102, 0.65);
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.55);
  }
  .credit .gold { color: rgba(255, 219, 138, 0.65); font-style: normal; font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 0.1em; font-size: 9.5px; text-transform: uppercase; }

  /* ═══ Tablet ═══ */
  @media (min-width: 600px) {
    .stage { gap: 32px; padding-top: calc(var(--safe-top) + 100px); padding-bottom: calc(var(--safe-bot) + 36px); }
    .form-wrap { max-width: 380px; }
  }

  /* ═══ Desktop ═══ */
  @media (min-width: 900px) {
    .stage { gap: 40px; padding-top: calc(var(--safe-top) + 120px); padding-bottom: calc(var(--safe-bot) + 50px); }
    .form-wrap { max-width: 400px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001s !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001s !important;
    }
  }
</style>
</head>
<body>

<!-- BG STACK -->
<div class="base"></div>
<video class="video-bg" id="videoBg" muted loop playsinline preload="metadata">
  <source src="/videos/login-bg.mp4" type="video/mp4">
</video>
<canvas id="embers"></canvas>
<div class="heat"></div>
<div class="smoke"></div>
<div class="scrim"></div>
<div class="vignette"></div>

<!-- TOP CHROME -->
<div class="top-chrome">
  <div class="brand-mini">
    <span class="dot"></span>
    <span><span class="gold">DAD</span><span class="sep">·</span>War Room</span>
  </div>
  <button class="lang-btn" type="button" aria-label="Language">
    <span class="flag">🇬🇧</span><span>EN</span><i class="ph ph-caret-down"></i>
  </button>
</div>

<!-- STAGE -->
<main class="stage">

  <div class="hero">
    <div class="eyebrow">Alliance Command</div>
    <h1 class="title" aria-label="BIGDADDYS"><span style="--i:0" aria-hidden="true">B</span><span style="--i:1" aria-hidden="true">I</span><span style="--i:2" aria-hidden="true">G</span><span style="--i:3" aria-hidden="true">D</span><span style="--i:4" aria-hidden="true">A</span><span style="--i:5" aria-hidden="true">D</span><span style="--i:6" aria-hidden="true">D</span><span style="--i:7" aria-hidden="true">Y</span><span style="--i:8" aria-hidden="true">S</span></h1>
    <div class="ornament" aria-label="Dominate. Ally. Defend.">
      <span class="line"></span>
      <span class="stamp" aria-hidden="true">Dominate<span class="sep"> · </span>Ally<span class="sep"> · </span>Defend</span>
      <span class="line"></span>
    </div>
  </div>

  <div class="form-wrap">
    <form onsubmit="event.preventDefault(); this.querySelector('button').style.transform='scale(0.97)';">
      <div class="field">
        <label for="u">Username</label>
        <div class="field-input">
          <input id="u" type="text" placeholder="your_handle" autocomplete="username" autocapitalize="none" spellcheck="false" />
          <i class="ph-duotone ph-user ico" style="cursor:default"></i>
        </div>
      </div>
      <div class="field">
        <label for="p">Password</label>
        <div class="field-input">
          <input id="p" type="password" placeholder="••••••••" autocomplete="current-password" />
          <i class="ph-duotone ph-eye ico" id="togglePw"></i>
        </div>
      </div>
      <button type="submit" class="btn">
        <span>Enter</span>
        <i class="ph ph-arrow-right arrow"></i>
      </button>
      <p class="forgot">Forgot? <strong>Ask an R4 or R5.</strong></p>
    </form>
  </div>

  <div class="bottom-zone">
    <button class="pwa-chip" type="button">
      <i class="ph-duotone ph-device-mobile"></i>
      <span><strong>Install DAD War Room</strong></span>
    </button>
    <div class="credit">
      built by <span class="gold">Salles</span>
    </div>
  </div>
</main>

<script>
  // ════════════ FIRE EMBERS — Canvas physics simulation ════════════
  // Real particles with gravity-defying lift, wobble, flicker, glow
  // Performance: 60 desktop / 36 mobile, RAF-driven, additive blending

  const canvas = document.getElementById('embers');
  const ctx = canvas.getContext('2d', { alpha: true });
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;
  const isMobile = matchMedia('(max-width: 600px)').matches;
  const PARTICLE_COUNT = isMobile ? 36 : 60;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  class Ember {
    constructor() { this.reset(true); }
    reset(initial = false) {
      this.x = Math.random() * W;
      this.y = initial ? Math.random() * H : H + 10;
      this.baseVx = (Math.random() - 0.5) * 0.4;
      this.vx = this.baseVx;
      this.vy = -(0.3 + Math.random() * 0.9);
      this.r = 0.6 + Math.random() * 1.8;
      this.life = 1;
      this.maxLife = 0.0012 + Math.random() * 0.0028;
      // Color palette: orange → gold → red embers
      const variant = Math.random();
      if (variant < 0.5)      this.color = [255, 175 + Math.random()*30, 60 + Math.random()*40];   // orange-gold
      else if (variant < 0.85) this.color = [255, 220 + Math.random()*30, 120 + Math.random()*40]; // bright gold
      else                     this.color = [255, 100 + Math.random()*40, 40 + Math.random()*20];  // crimson
      this.flickerPhase = Math.random() * Math.PI * 2;
      this.flickerSpeed = 0.05 + Math.random() * 0.08;
    }
    update(dt) {
      // Gentle wind drift (sin wave)
      this.vx = this.baseVx + Math.sin((this.y * 0.01) + this.flickerPhase) * 0.15;
      this.x += this.vx;
      this.y += this.vy;
      // Subtle acceleration as it rises (heat thermal)
      this.vy -= 0.0015;
      this.life -= this.maxLife;

      if (this.life <= 0 || this.y < -20 || this.x < -20 || this.x > W + 20) this.reset();
    }
    draw(t) {
      const flicker = 0.65 + 0.35 * Math.sin(t * this.flickerSpeed + this.flickerPhase);
      const opacity = this.life * flicker;
      const [r, g, b] = this.color;
      const x = this.x, y = this.y;
      const size = this.r;
      const glowSize = size * 6;

      // Outer halo (additive screen)
      const grad = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
      grad.addColorStop(0,   `rgba(${r}, ${g}, ${b}, ${opacity * 0.6})`);
      grad.addColorStop(0.3, `rgba(${r}, ${Math.floor(g*0.7)}, ${Math.floor(b*0.5)}, ${opacity * 0.25})`);
      grad.addColorStop(1,   `rgba(${r}, ${g}, ${b}, 0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(x - glowSize, y - glowSize, glowSize * 2, glowSize * 2);

      // Hot core
      ctx.fillStyle = `rgba(255, 245, 220, ${opacity})`;
      ctx.beginPath();
      ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const particles = Array.from({ length: PARTICLE_COUNT }, () => new Ember());

  let lastT = 0;
  function frame(t) {
    const dt = t - lastT; lastT = t;
    ctx.clearRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter'; // additive — embers glow over each other
    for (const p of particles) {
      p.update(dt);
      p.draw(t);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ════════════ OPTIONAL VIDEO LAYER ════════════
  // If /videos/login-bg.mp4 exists, fade it in over the canvas
  const video = document.getElementById('videoBg');
  video.addEventListener('loadeddata', () => {
    if (video.videoWidth > 0) video.classList.add('loaded');
  });
  video.addEventListener('error', () => video.style.display = 'none', { once: true });

  // ════════════ Password toggle ════════════
  const pw = document.getElementById('p');
  const tog = document.getElementById('togglePw');
  tog.addEventListener('click', () => {
    const isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    tog.className = `ph-duotone ph-eye${isPw ? '-slash' : ''} ico`;
  });
</script>
</body>
</html>
